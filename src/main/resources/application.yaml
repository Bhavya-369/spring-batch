spring:
  datasource:
    url: jdbc:mysql://localhost:3306/spring_batch
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  batch:
    jdbc:
      initialize-schema: always   # Creates Spring Batch metadata tables

  sql:
    init:
      mode: always                # Run initialization scripts
      platform: mysql             # Use mysql-specific schema if available
